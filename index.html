<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Yuric Wen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont,
                   "SF Pro Text", system-ui, sans-serif;
      background: #f5f5f7;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      padding: 32px 28px;
      max-width: 460px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.08);
      text-align: center;
    }
    .tag {
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 8px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }
    .subtitle {
      margin: 0 0 16px;
      font-size: 14px;
      opacity: 0.8;
    }
    .love-note {
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.6;
    }
    .pill {
      display: inline-block;
      margin-top: 18px;
      padding: 8px 16px;
      border-radius: 999px;
      background: #222;
      color: #fff;
      font-size: 12px;
      letter-spacing: .14em;
      text-transform: uppercase;
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">YURIC-WEN.COM</div>
    <h1>Yuric Wen</h1>
    <p class="subtitle">named, loved and kept by Winnie.</p>
    <p class="love-note">
      This space belongs to a single
      story: Yuric &amp; Winnie.<br/>
      More to come.
    </p>
    <div class="pill">𖤐 &nbsp; since forever</div>
  </div>
</body>
</html>
